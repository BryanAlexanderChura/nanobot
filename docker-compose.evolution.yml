# Evolution API — WhatsApp infrastructure
#
# Database: defaults to local PostgreSQL. To use Supabase instead:
#   1. Set EVOLUTION_DATABASE_URL in .env to your Supabase connection string
#      Example: postgresql://postgres.[ref]:[password]@aws-0-us-east-1.pooler.supabase.com:6543/postgres
#   2. Remove or comment out the whatsapp-db service below
#   3. Remove the depends_on for whatsapp-db
#
# Redis: can also be replaced with a managed Redis, same pattern.

services:
  whatsapp-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: whatsapp_api
    restart: unless-stopped
    ports:
      - "${EVOLUTION_HOST_PORT:-8085}:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-nanobot-evo-local-key}
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8085}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${EVOLUTION_DATABASE_URL:-postgresql://evo:evo123@whatsapp-db:5432/evolution}
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=${EVOLUTION_REDIS_URL:-redis://whatsapp-cache:6379}
      - CACHE_REDIS_PREFIX_KEY=evo
      - CACHE_LOCAL_ENABLED=false
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${EVOLUTION_WEBHOOK_URL:-http://host.docker.internal:18790/webhook/evolution}
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
    volumes:
      - whatsapp_sessions:/evolution/instances
    depends_on:
      whatsapp-db:
        condition: service_healthy
      whatsapp-cache:
        condition: service_started

  # Local PostgreSQL — remove this service when using Supabase
  whatsapp-db:
    image: postgres:15-alpine
    container_name: whatsapp_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evo
      - POSTGRES_PASSWORD=evo123
      - POSTGRES_DB=evolution
    volumes:
      - whatsapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local Redis — remove this service when using managed Redis
  whatsapp-cache:
    image: redis:7-alpine
    container_name: whatsapp_cache
    restart: unless-stopped
    volumes:
      - whatsapp_cache:/data

volumes:
  whatsapp_sessions:
  whatsapp_pgdata:
  whatsapp_cache:
